name: tests

on:
  pull_request:
    branches: [main]
    paths:
      - "slides.py"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.10 = サポート下限（README 記載）。下限で import が通ることを担保し、
        # 「ドキュメント上の最低バージョンでは動かない」乖離を機械検知する。
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # レイアウト検査の生成時リント（validate_fit）が必要とするのは python-pptx と
      # Pillow のみ。レンダリング系（PyMuPDF / LibreOffice / cairosvg）はテストで
      # 使わないため入れない。テストはフォント幅に依存しない（CI に Arial 不要）。
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "python-pptx==1.0.2" "Pillow>=10.4"
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest
